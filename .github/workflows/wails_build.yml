name: Wails build

on:
  push:
    tags:
    # Match any new tag
      - '*'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build: [
          {name: wailsBuild, platform: windows/amd64, os: windows-latest},
        ]
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@main
        with:
          submodules: recursive
      - uses: dAppServer/wails-build-action@main
        with:
          build-name: ChatInput.exe
          build-platform: ${{ matrix.build.platform }}
          go-version: 1.24.4
      - name: Download avis
        run: |
          mkdir temp
          cd temp
          curl -L -o ChatInput.exe https://github.com/SayukiDev/NewChatInput/releases/download/latest/ChatInput.exe
          curl -L -o AivisSpeech-Engine-Windows-x64-1.1.0-dev.7z.001 https://github.com/Aivis-Project/AivisSpeech-Engine/releases/download/1.1.0-dev/AivisSpeech-Engine-Windows-x64-1.1.0-dev.7z.001
          7z x AivisSpeech-Engine-Windows-x64-1.1.0-dev.7z.001
          mv Windows-x64 aivis
          rm AivisSpeech-Engine-Windows-x64-1.1.0-dev.7z.001
          Compress-Archive -Path ./* -DestinationPath ChatInputWithTTS.zip
          mv ChatInputWithTTS.zip ../
          cd ../
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: ChatInputWithTTS.zip